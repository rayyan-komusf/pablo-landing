# Reverse proxy de PostHog para esquivar bloqueadores de anuncios/privacidad.
#
# Los bloqueadores tumban *.posthog.com (assets + ingesta), así que ni los
# replays ni los eventos llegan de usuarios con adblock/Brave/Safari. Este
# proxy expone PostHog bajo un subdominio propio (ej. ph.usapablo.app) que
# NO está en las listas de bloqueo. La app y la landing apuntan su
# `api_host` aquí en vez de a us.i.posthog.com.
#
# EasyPanel termina el TLS por delante, así que el contenedor escucha en :80.

server {
    listen 80;
    server_name _;

    # Sin límite de tamaño: los snapshots de session replay pueden ser grandes.
    client_max_body_size 0;

    # Assets del SDK (array.js, recorder.js, surveys.js, config remoto, etc.)
    location /static/ {
        proxy_pass https://us-assets.i.posthog.com/static/;
        proxy_set_header Host us-assets.i.posthog.com;
        proxy_ssl_server_name on;
    }
    location /array/ {
        proxy_pass https://us-assets.i.posthog.com/array/;
        proxy_set_header Host us-assets.i.posthog.com;
        proxy_ssl_server_name on;
    }

    # Ingesta: eventos (/e/, /i/, /batch/), snapshots (/s/), flags (/flags, /decide).
    location / {
        proxy_pass https://us.i.posthog.com/;
        proxy_set_header Host us.i.posthog.com;
        proxy_ssl_server_name on;
        # Preservar IP real para que PostHog resuelva geolocalización correctamente.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
