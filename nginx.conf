server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirects relativos (/cursos -> /cursos/) para que funcionen
    # detras de cualquier puerto o reverse proxy.
    absolute_redirect off;

    # Equivalente a los rewrites de vercel.json:
    # /onboarding* se proxya a la app de onboarding conservando el path.
    location /onboarding {
        proxy_pass https://pablo-onboarding.vercel.app;
        proxy_set_header Host pablo-onboarding.vercel.app;
        proxy_ssl_server_name on;
    }

    # Assets con hash generados por Astro: cache inmutable.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
